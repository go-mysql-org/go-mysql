name: runTestsAndLinters
on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        go: ['1.16', '1.15']
    name: Tests Go ${{ matrix.go }}
    # ubuntu-18.04 was retired by GitHub (jobs hung "waiting for a runner").
    # ubuntu-latest ships MySQL 8.0, so the setup below uses 8.0-compatible SQL.
    runs-on: ubuntu-latest

    steps:
      - name: Setup MySQL
        run: |
          echo -n "mysql -V: " ; mysql -V
          echo -n "mysqldump -V: " ; mysqldump -V

          echo -e '[mysqld]\nserver-id=1\nlog-bin=mysql\nbinlog-format=row\ngtid-mode=ON\nenforce_gtid_consistency=ON\ndefault-authentication-plugin=mysql_native_password\n' | sudo tee /etc/mysql/conf.d/replication.cnf
          sudo service mysql start
          # MySQL 8.0 removed the PASSWORD() function: set root to empty password + native auth via ALTER USER
          sudo mysql -uroot -proot -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY ''; FLUSH PRIVILEGES;"
          # SSL/RSA files (auto-generated on 8.0; tolerate absence of the helper)
          sudo mysql_ssl_rsa_setup --uid=mysql || true
          mysql -e "CREATE DATABASE IF NOT EXISTS test;" -uroot
          mysql -e "SHOW VARIABLES LIKE 'log_bin'" -uroot
          mysql -e "SELECT @@gtid_mode" -uroot
      - name: Prepare for Go
        run: |
          sudo apt-get install -y make gcc
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run tests
        run: go test ./...

  golangci:
    name: golangci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
